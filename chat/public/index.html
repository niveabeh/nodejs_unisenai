<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat com Node e CSS</title>
</head>

<body>

    <div id="login">

        <h2>Entre no Chat</h2>
        <input id="userName" placeholder="Digite seu nome"/>
        <button onclick="enterChat()">Entrar</button>
        
    </div>

    <div id="chat">

        <ul id="messages"></ul>

        <form id="form">

            <input id="input" autocomplete="off" placeholder="Digite sua mensagem...">
            <button>Enviar</button>

        </form>

    </div>

</body>

    <script src="/socket.io/socket.io.js"></script>

    <script>

        const socket = io();

        let userName = '';
        let userColor = '';

        const userColors = {};

        function generateColor(name){
            if(userColors[name]) return userColors[name];
       
            let hash = 0 

            // Transforma a letra em um número visando a tabela ASCII, comando efetuando isso é o charCodeAt
            for(let i = 0; i < name.length; i++){

                // pega o código em ASCII, soma com o resultado
                hash = name.charCodeAt(i)+ ((hash <<5)-hash);
            }
            
            /// a primeira parte significa a matriz, saturação e iluminação.
            const color = `hsl(${hash % 360}, 60% , 70%)`


            //Inclui na array userColors
            userColors[name] = color;

            return color;


       
        }


        function enterChat(){

            const nameInput = document.getElementById('userName');
            
            const name = nameInput.value.trim();

            console.log(nameInput);

            if(name){

                userName = name;

                userColor = generateColor(userName);
                socket.emit('set username', userName);
                document.getElementById('login').style.display = 'none';
                document.getElementById('chat').style.display = 'flex';
            }
        }

        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');

        form.addEventListener('submit', (e)=>{

            e.preventDefault();

            if(input.value){

                socket.emit('chat message', input.value);
                input.value = '';

            }

        });

        socket.on('chat message',({name, message})=>{

            const item = document.createElement('li');

            const nameTag = document.createElement('span');

            nameTag.textContent = name;
            nameTag.className = 'message-name';
            nameTag.style.backgroundColor = generateColor(name);

            item.appendChild(nameTag);
            item.append(message);

            messages.appendChild(item);
            messages.scrollTop = messages.scrollHeight;
            
        });


    </script>
</html>
